services:
  app:
    build:
      context: .
      target: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pyrocms
      DB_USERNAME: pyrocms
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html

  node:
    image: node:20-bookworm-slim
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run watch-poll"
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: pyrocms
      MYSQL_USER: pyrocms
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  mysql_dev_data:
  redis_dev_data:
